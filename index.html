<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FLAMES</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Outfit:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <section class="card">
      <h1 class="flames">FLAMES</h1>
      <p class="subtitle">Find your playful relationship result</p>

      <form id="form" autocomplete="off">
        <label class="field-label" for="name1">First Name</label>
        <input id="name1" type="text" placeholder="Type first name" class="name1">

        <label class="field-label" for="name2">Second Name</label>
        <input id="name2" type="text" placeholder="Type second name" class="name2">

        <div class="buttons">
          <button type="button" class="subbut">Reveal</button>
          <button type="reset" class="canbut">Reset</button>
        </div>
      </form>

      <div class="result_div">
        <p id="result"></p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
